apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: integration-tests
  labels:
    app: inventory-service
    team: integration-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        team: integration-tests
    spec:
      containers:
      - name: inventory-service
        image: ${DOCKER_USER}/inventory-service:${GIT_SHA}
        ports:
        - containerPort: 8082
        env:
        - name: SHIPPING_SERVICE_URL
          value: "http://shipping-service:8083"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: integration-tests
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
  - port: 8082
    targetPort: 8082
