apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: integration-tests
  labels:
    app: shipping-service
    team: integration-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
        team: integration-tests
    spec:
      containers:
      - name: shipping-service
        image: ${DOCKER_USER}/shipping-service:${GIT_SHA}
        ports:
        - containerPort: 8083
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: integration-tests
spec:
  type: ClusterIP
  selector:
    app: shipping-service
  ports:
  - port: 8083
    targetPort: 8083
