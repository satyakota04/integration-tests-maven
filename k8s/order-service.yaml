apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: integration-tests
  labels:
    app: order-service
    team: integration-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        team: integration-tests
    spec:
      containers:
      - name: order-service
        image: ${DOCKER_USER}/order-service:${GIT_SHA}
        ports:
        - containerPort: 8081
        env:
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service:8082"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: integration-tests
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - port: 8081
    targetPort: 8081
